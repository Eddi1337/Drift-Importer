<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drift-Import{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <span class="brand">📷 Drift-Import</span>
    <nav>
      <a href="/" class="{{ 'on' if active=='gallery.html' else '' }}">Library</a>
      <a href="/albums" class="{{ 'on' if active=='albums.html' else '' }}">Albums</a>
      <a href="/destinations" class="{{ 'on' if active=='destinations.html' else '' }}">Destinations</a>
      <a href="/jobs" class="{{ 'on' if active=='jobs.html' else '' }}">Jobs</a>
    </nav>
    <span id="jobBadge" class="badge" title="active jobs"></span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <div id="toast" class="toast"></div>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
