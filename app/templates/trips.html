{% extends "base.html" %}
{% block title %} · Trips{% endblock %}
{% block content %}
<section class="panel">
  <h2>Trips</h2>
  <div class="row">
    <input id="albumName" placeholder="New trip name">
    <button onclick="createAlbum()">Create trip</button>
  </div>
  <div id="albumList">Loading…</div>
</section>
<p class="hint">Open a trip to reorder clips. Use Combine trip to join the clips into one long video and add it back to the trip.</p>
{% endblock %}
{% block scripts %}<script>initAlbums();</script>{% endblock %}
